<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes Management Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">


  <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
      <h1 class="text-2xl font-bold text-indigo-600 tracking-tight">Notes Workspace</h1>
      

      <div class="w-full sm:w-80 relative">
        <input 
          type="text" 
          id="searchInput" 
          placeholder="Search notes by title or content..." 
          class="w-full bg-slate-100 placeholder-slate-400 border border-slate-200 rounded-lg pl-3 pr-10 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all"
        />
        <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-slate-400">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
      </div>
    </div>
  </header>


  <main class="max-w-6xl mx-auto px-4 py-8 grid grid-cols-1 md:grid-cols-3 gap-8">
    

    <section class="md:col-span-1">
      <div class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm sticky top-24">
        <h2 id="formTitle" class="text-lg font-semibold text-slate-900 mb-4">Create New Note</h2>
        
        
        <div id="formAlert" class="hidden mb-4 p-3 rounded-lg text-xs font-medium"></div>

        <form id="noteForm" class="space-y-4">
          <input type="hidden" id="noteId">
          
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Title *</label>
            <input 
              type="text" 
              id="noteTitle" 
              required
              placeholder="Enter a descriptive title..." 
              class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
            />
          </div>

          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Content Body</label>
            <textarea 
              id="noteContent" 
              rows="6" 
              placeholder="Type your notes details here..." 
              class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none"
            ></textarea>
          </div>


          <div class="flex items-center gap-3 pt-2">
            <button 
              type="submit" 
              class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-medium text-sm py-2.5 px-4 rounded-lg shadow-sm transition-colors"
            >
              Save Note
            </button>
            <button 
              type="button" 
              id="cancelEditBtn" 
              class="hidden px-4 py-2.5 border border-slate-200 text-slate-600 hover:bg-slate-50 font-medium text-sm rounded-lg transition-colors"
            >
              Cancel
            </button>
          </div>
        </form>
      </div>
    </section>


    <section class="md:col-span-2 space-y-6">
      <div class="flex items-center justify-between border-b border-slate-200 pb-3">
        <h3 class="text-sm font-semibold uppercase tracking-wider text-slate-400">All Saved Records</h3>
        <span id="noteCounter" class="bg-slate-200 text-slate-700 text-xs px-2.5 py-0.5 rounded-full font-bold">0</span>
      </div>


      <div id="notesContainer" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        </div>
    </section>
  </main>


  <script src="app.js"></script>
</body>
</html>
